experiment:
  name: coco_40p10_yolov8n_yolo_lwf_ocdm
  output_dir: outputs/coco_40p10_yolov8n_yolo_lwf_ocdm
  seed: 0

task:
  type: class_incremental
  scenario: 40p10
  initial_classes: 40
  increment: 10
  class_order: natural

dataset:
  source: configs/datasets/coco.yaml

model:
  name: yolov8
  variant: yolov8n
  pretrained: yolov8n-cls.pt
  pretrained_type: cls_backbone
  backbone_pretrained_max_module: 8
  num_classes: 80

method:
  name: yolo_lwf_ocdm
  lambda_distill: 1.0

  distill:
    # original: lwf = (4000.0, 500.0, 0.0)
    c1: 4000.0
    c2: 500.0
    c3: 0.0

    # Original LwFReplay2 scaling is effectively lwf_gain=1.0
    lwf_gain: 1.0

    use_new_images: true
    debug_loss_scaling: false

    # Original cfg has feats_distill=(1.0,1.0), but that is for RCLPOD-style
    # backbone/neck feature distillation. Current YOLO-LwF+OCDM branch does not use it.
    feats_distill:
      backbone: 1.0
      neck: 1.0

  replay:
    enabled: true
    strategy: ocdm

    # original: replay_mem_size = 6000
    memory_size: 6000

    use_labels: true

    # original: inference_ths = 0.5
    pseudo_conf_thres: 0.5

    pseudo_iou_thres: 0.7

    # original: batch_size_ocdm = 10000
    batch_size_ocdm: 10000

    # original: ocdm_ths = None
    ocdm_ths: null

    # original: save_num_dup = True
    save_num_dup: true

training:
  batch_size: 32
  eval_batch_size: 32

  # original: epochs = 100 and epochs_per_task = 100
  epochs_per_task: 100
  workers: 8
  pin_memory: true
  device: cuda:1

  # original: input_shape = [3, 640, 640]
  img_size: 640
  stride: 32
  rect: false

  # original optimizer params
  optimizer: SGD
  lr: 0.01
  momentum: 0.937
  weight_decay: 0.0005

  # original: warmup_epochs = 3
  warmup_epochs: 3.0

  # original: lrf = 0.01, final lr = lr0 * lrf = 1e-4
  min_lr_ratio: 0.01

  # Original has:
  # warmup_momentum = 0.8
  # warmup_bias_lr = 0.1
  # These require code support if you want exact alignment.
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

  nbs: 64
  accumulate: 1

  grad_clip: 10.0
  amp: true
  augment: true

  print_loss_scaling: true
  loss_debug_interval: 500

augmentation:
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0

  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4

  flipud: 0.0
  fliplr: 0.5

  mosaic: 1.0
  mixup: 0.0
  cutmix: 0.0
  copy_paste: 0.0
  copy_paste_mode: flip

  mask_ratio: 4
  overlap_mask: true
  bgr: 0.0

evaluation:
  conf_thres: 0.001
  iou_thres: 0.7
  max_det: 300
  save_csv: true
  print_results: true
